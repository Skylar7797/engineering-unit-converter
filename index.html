<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engineering Calculator & Unit Converter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS 분리 -->
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>Engineering Calculator</h1>
  <p>Professional engineering tools</p>
</header>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-link active" data-page="converter">Converter & Calculator</a>
    <a href="#" class="nav-link" data-page="insights">Insights</a>
    <a href="#" class="nav-link" data-page="faq">FAQ</a>
    <a href="#" class="nav-link" data-page="help">Help</a>
  </div>
</nav>

<main id="main-content">
  <!-- Converter & Calculator -->
  <div id="page-converter" class="page">
    <!-- Unit Converter -->
    <h2>Unit Converter</h2>
    <div class="converter-grid">
      <div class="converter-box">
        <select id="dimA"></select>
        <div class="row">
          <input type="number" id="valA">
          <select id="fromA"></select>
          <div class="arrow">→</div>
          <select id="toA"></select>
        </div>
        <button onclick="convert('A')">Convert</button>
        <div class="result" id="outA"></div>
      </div>

      <div class="converter-box">
        <select id="dimB"></select>
        <div class="row">
          <input type="number" id="valB">
          <select id="fromB"></select>
          <div class="arrow">→</div>
          <select id="toB"></select>
        </div>
        <button onclick="convert('B')">Convert</button>
        <div class="result" id="outB"></div>
      </div>
    </div>

    <!-- Scientific Calculator -->
    <h2>Scientific Calculator</h2>
    <div class="calc-layout">
      <div class="calc-box">
        <div class="history" id="history"></div>
        <input class="calc-screen" id="screen" type="text">
        <div class="angle-mode" id="angleMode">Angle Mode: RAD</div>
        <div class="latest" id="latest">Latest: —</div>
        <div class="keys" id="calculator-keys"></div>
      </div>

      <div class="notes">
        <div class="note-title">Note 1</div><textarea class="note"></textarea>
        <div class="note-title">Note 2</div><textarea class="note"></textarea>
        <div class="note-title">Note 3</div><textarea class="note"></textarea>
      </div>
    </div>
  </div>

  <!-- Insights -->
  <div id="page-insights" class="page" style="display:none;"></div>

  <!-- FAQ -->
  <div id="page-faq" class="page" style="display:none;"></div>

  <!-- Help -->
  <div id="page-help" class="page" style="display:none;"></div>

</main>

<footer>
  <a href="/about.html">About</a> |
  <a href="/privacy.html">Privacy Policy</a> |
  <a href="/contact.html">Contact</a>
</footer>

<!-- JS 분리 -->
<script src="js/converter.js"></script>
<script src="js/calculator.js"></script>
<script src="js/spa.js"></script>
</body>
</html>
