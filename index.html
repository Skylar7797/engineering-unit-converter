<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1VBV3J3DVG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-1VBV3J3DVG');
  
  function trackPage(path, title) {
    gtag('event', 'page_view', {
      page_path: path,
      page_title: title
    });
  }

<meta charset="UTF-8">
<title>Engineering Workbench</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

  
<body>
  
<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">Engineering Workbench</div>
  </div>
</header>

<!-- NAV -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-link active">Calculator</a>
    <a href="/insights.html" class="nav-link">Insights</a>
    <a href="/faq.html" class="nav-link">FAQ</a>
    <a href="/help.html" class="nav-link">Help</a>
  </div>
</nav>

<!-- MAIN -->
<main class="site-main">
  <div class="main-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar left-sidebar">
      <!-- optional widgets -->
    </aside>

    <!-- CENTER CONTENT -->
    <section class="main-container">
      <div class="workbench">

      <!-- LEFT STACK -->
      <div class="tool-stack">
        <section class="tool-panel">
          <h2>Unit Converter</h2>        
          <div class="converter-layout">
        
            <!-- LEFT: PARAMETER LIST -->
            <aside class="converter-params" id="paramList">
              <!-- JS에서 자동 생성 -->
            </aside>
        
            <!-- RIGHT: CONVERSION -->
            <div class="converter-work">
        
              <div class="convert-input">
                <input type="number" id="inputValue" placeholder="Enter value">
                <select id="fromUnit"></select>
                <span class="arrow">→</span>
                <select id="toUnit"></select>
              </div>
        
              <button class="convert-btn" id="convertBtn">Convert</button>
        
              <div class="convert-result">
                <div class="result-label">Result</div>
                <div class="result-value" id="resultValue">—</div>
              </div>
        
            </div>
        
          </div>
        
        </section>
  
        <section class="tool-panel">
          <h2>Scientific Calculator</h2>
          <div id="calculator">

          <!-- HISTORY -->
          <div id="calc-history" class="calc-history"></div>
        
          <!-- DISPLAY -->
          <div class="calc-display">
            <input
              type="text"
              id="calc-input"
              value="0"
              readonly
            />
            <div id="angle-mode" class="angle-mode">DEG</div>
          </div>
        
          <!-- BUTTONS -->
          <div class="calc-buttons">
        
            <!-- Row 0 : MODE -->
            <button data-key="SHIFT" class="shift">SHIFT</button>
            <button data-key="ANS">ANS</button>
            <button data-key="π">π</button>
            <button data-key="EXP">EXP</button>
            <button data-key="DEL">DEL</button>
          
            <!-- Row 1 -->
            <button data-key="sin">sin</button>
            <button data-key="cos">cos</button>
            <button data-key="tan">tan</button>
            <button data-key="(">(</button>
            <button data-key=")">)</button>
          
            <!-- Row 2 -->
            <button data-key="log">log</button>
            <button data-key="ln">ln</button>
            <button data-key="√">√</button>
            <button data-key="pow">xʸ</button>
            <button data-key="x2">x²</button>
          
            <!-- Row 3 -->
            <button data-key="7">7</button>
            <button data-key="8">8</button>
            <button data-key="9">9</button>
            <button data-key="/">÷</button>
            <button data-key="C">C</button>
          
            <!-- Row 4 -->
            <button data-key="4">4</button>
            <button data-key="5">5</button>
            <button data-key="6">6</button>
            <button data-key="*">×</button>
            <button data-key="-">−</button>
          
            <!-- Row 5 -->
            <button data-key="1">1</button>
            <button data-key="2">2</button>
            <button data-key="3">3</button>
            <button data-key="+">+</button>
            <button data-key="=" class="equal">=</button>
          
            <!-- Row 6 -->
            <button data-key="0" class="zero">0</button>
            <button data-key=".">.</button>
        
          </div>
            
        </div>

        </section>
      </div>
  
      <!-- RIGHT MEMO -->
      <aside class="memo-panel">
        <h2>Notes</h2>
        <textarea class="memo"></textarea>
      </aside>
    
      </div>
    </section>

    <!-- RIGHT SIDEBAR -->
    <aside class="sidebar right-sidebar">
      <!-- optional widgets -->
    </aside>

  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <a href="/about.html">About</a>
    <span>|</span>
    <a href="/privacy.html">Privacy Policy</a>
    <span>|</span>
    <a href="/contact.html">Contact</a>
  </div>
</footer>


<script src="js/converter.js"></script>
<script src="js/calculator.js"></script>

</body>
</html>
