<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graph Analytic | Engineering Workbench</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">Engineering Workbench</div>
  </div>
</header>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/index.html" class="nav-link">Converter & Calculator</a>
    <a href="/GraphAnalytic.html" class="nav-link active">Graph Analytic</a>
    <a href="/insights.html" class="nav-link">Insights</a>
    <a href="/faq.html" class="nav-link">FAQ</a>
    <a href="/help.html" class="nav-link">Help</a>
  </div>
</nav>

<main class="site-main">
<div class="main-layout">

<section class="main-container">
<h1>Graph Analytic</h1>

<section class="tool-panel">

<h2>Function Plotter</h2>

<!-- Cursor Mode -->
<div style="display:flex; gap:12px;">
  <label><input type="radio" name="cursorMode" value="follow" checked> Follow Function</label>
  <label><input type="radio" name="cursorMode" value="free"> Free Cursor</label>
</div>

<!-- Axis Scale -->
<div style="display:flex; gap:12px; margin-top:10px;">
  <label>X-axis:
    <select id="xScale">
      <option value="linear">Linear</option>
      <option value="log">Log</option>
    </select>
  </label>

  <label>Y-axis:
    <select id="yScale">
      <option value="linear">Linear</option>
      <option value="log">Log</option>
    </select>
  </label>
</div>

<!-- Function Input -->
<div class="convert-input" style="margin-top:12px;">
  <input type="text" id="functionInput"
    placeholder="e.g. sin(x), x^2-4, exp(-x)" />
  <button id="plotBtn" class="convert-btn">Plot</button>
</div>

<!-- Preset Functions -->
<div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
  <button class="convert-btn preset" data-fn="exp(-x^2)">Gaussian</button>
  <button class="convert-btn preset" data-fn="sin(x)">Wave</button>
  <button class="convert-btn preset" data-fn="sin(x)/x">Sinc</button>
  <button class="convert-btn preset" data-fn="exp(-x)*cos(2*x)">Damped</button>
</div>

<canvas
  id="graphCanvas"
  width="900"
  height="450"
  style="margin-top:16px; width:100%; background:#f8fbff;">
</canvas>

</section>

<section class="tool-panel" style="margin-top:24px;">
<h2>Analysis</h2>
<div id="analysisOutput" class="result-label">Awaiting input</div>
</section>

</section>
</div>
</main>

<script src="js/graph.js"></script>
</body>
</html>
